<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio dos Baldes: Missão 4 Litros</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { color: #4fa3f7; margin-bottom: 10px; }
        .instructions { margin-bottom: 20px; text-align: center; max-width: 600px; color: #ccc; }

        #game-container {
            display: flex;
            gap: 50px;
            align-items: flex-end;
            height: 300px;
            margin-bottom: 30px;
        }

        .bucket-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        canvas {
            border: 4px solid #555;
            border-top: none;
            border-radius: 0 0 10px 10px;
            background: rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: #333;
            color: white;
        }

        button:hover { background: #444; transform: translateY(-2px); }
        .btn-fill { background: #2ecc71; color: white; }
        .btn-empty { background: #e74c3c; color: white; }
        .btn-transfer { background: #3498db; color: white; }

        #message {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 30px;
        }

        .win { color: #2ecc71; animation: celebrate 0.5s infinite alternate; }
        @keyframes celebrate { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <h1>L2.E1: O Enigma dos Baldes</h1>
    <div class="instructions">
        Objetivo: Obtenha exatamente <b>4 Litros</b> em qualquer um dos baldes.<br>
        Use os botões abaixo para encher, esvaziar ou transferir a água.
    </div>

    <div id="game-container">
        <div class="bucket-wrapper">
            <canvas id="bucket3" width="120" height="150"></canvas>
            <div>Balde 3L: <span id="val3">0</span>L</div>
        </div>

        <div class="bucket-wrapper">
            <canvas id="bucket5" width="140" height="250"></canvas>
            <div>Balde 5L: <span id="val5">0</span>L</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-fill" onclick="fill(3)">Encher 3L</button>
        <button class="btn-fill" onclick="fill(5)">Encher 5L</button>
        <button class="btn-empty" onclick="empty(3)">Esvaziar 3L</button>
        <button class="btn-empty" onclick="empty(5)">Esvaziar 5L</button>
        <button class="btn-transfer" onclick="transfer(3, 5)">Passar 3L → 5L</button>
        <button class="btn-transfer" onclick="transfer(5, 3)">Passar 5L → 3L</button>
        <button onclick="reset()">Resetar</button>
    </div>

    <div id="message"></div>

    <script>
        let b3 = 0; // Volume atual balde 3
        let b5 = 0; // Volume atual balde 5
        const cap3 = 3;
        const cap5 = 5;

        function updateUI() {
            document.getElementById('val3').innerText = b3;
            document.getElementById('val5').innerText = b5;
            drawBucket('bucket3', b3, cap3);
            drawBucket('bucket5', b5, cap5);
            checkWin();
        }

        function drawBucket(id, current, capacity) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);

            // Desenhar Água
            const fillHeight = (current / capacity) * h;
            ctx.fillStyle = '#3498db';
            // Animação simples de "balanço" (opcional, aqui estática para clareza)
            ctx.fillRect(0, h - fillHeight, w, fillHeight);

            // Brilho da água
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(0, h - fillHeight, w, 10);
        }

        function fill(bucket) {
            if (bucket === 3) b3 = cap3;
            else b5 = cap5;
            updateUI();
        }

        function empty(bucket) {
            if (bucket === 3) b3 = 0;
            else b5 = 0;
            updateUI();
        }

        function transfer(from, to) {
            if (from === 3 && to === 5) {
                let space = cap5 - b5;
                let amount = Math.min(b3, space);
                b3 -= amount;
                b5 += amount;
            } else {
                let space = cap3 - b3;
                let amount = Math.min(b5, space);
                b5 -= amount;
                b3 += amount;
            }
            updateUI();
        }

        function reset() {
            b3 = 0;
            b5 = 0;
            document.getElementById('message').innerText = "";
            document.getElementById('message').className = "";
            updateUI();
        }

        function checkWin() {
            if (b3 === 4 || b5 === 4) {
                const msg = document.getElementById('message');
                msg.innerText = "🎉 PARABÉNS! VOCÊ CONSEGUIU OS 4 LITROS!";
                msg.className = "win";
            }
        }

        // Inicializar
        updateUI();
    </script>
</body>
</html>
